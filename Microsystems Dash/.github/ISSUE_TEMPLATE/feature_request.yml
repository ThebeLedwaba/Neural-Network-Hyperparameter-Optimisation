name: Feature Request
description: Suggest a new feature
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe your feature request.

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: Describe the problem or limitation
      placeholder: I'm frustrated when...
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see happen
      placeholder: The system should...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative solutions
      description: Have you considered other approaches?
      placeholder: Another way could be...
    validations:
      required: false

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Real-world example of how this helps
      placeholder: This would help when...
    validations:
      required: false
